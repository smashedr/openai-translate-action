name: "Check Build"

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request_target:
    paths:
      - ".github/workflows/check-build.yaml"
      - "dist/**"
      - "src/**"
      - "package*.json"
      - "rollup.config.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-build:
    name: "Check Build"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: "Debug event.json"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: cat "${GITHUB_EVENT_PATH}"
      - name: "Debug CTX github"
        if: ${{ !github.event.act }}
        continue-on-error: true
        env:
          GITHUB_CTX: ${{ toJSON(github) }}
        run: echo "$GITHUB_CTX"
      - name: "Debug Environment"
        if: ${{ !github.event.act }}
        continue-on-error: true
        run: env

      - name: "Checkout Pull"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: "Setup Node 24"
        uses: actions/setup-node@v6
        with:
          node-version: 24

      #- name: "Setup NPM"
      #  run: |
      #    npm install -g npm@11.11.1

      - name: "Debug"
        continue-on-error: true
        run: |
          node --version
          npm --version
          echo "::group::ls"
          ls -lAh
          echo "::endgroup::"
          echo "::group::tree"
          tree .
          echo "::endgroup::"

      - name: "Check Build Action"
        continue-on-error: true
        uses: cssnr/check-build-action@v1
